<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Great On Their Behalf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #1A3A5C;
      --navy-lt: #2E618B;
      --navy-dk: #0F2538;
      --ice:     #EBF2F8;
      --white:   #FFFFFF;
      --body:    #222222;
      --muted:   #5A6E80;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--body);
      background: var(--white);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      background: var(--navy-dk);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 56px;
    }

    .nav-brand {
      color: var(--white);
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.01em;
      text-decoration: none;
      white-space: nowrap;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      color: #B8D0E8;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.15s;
    }

    .nav-links a:hover { color: var(--white); }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5rem 2rem;
      text-align: center;
    }

    .not-found h1 {
      font-size: 5rem;
      font-weight: 800;
      color: var(--navy);
      line-height: 1;
      margin-bottom: 1rem;
      letter-spacing: -0.04em;
    }

    .not-found h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 0.75rem;
    }

    .not-found p {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 2rem;
    }

    .btn-back {
      display: inline-block;
      background: var(--navy);
      color: var(--white);
      font-weight: 700;
      font-size: 1rem;
      padding: 0.9rem 2rem;
      border-radius: 4px;
      text-decoration: none;
      transition: background 0.15s;
    }

    .btn-back:hover { background: var(--navy-lt); }

    footer {
      background: var(--navy-dk);
      color: #7FAFD4;
      padding: 2rem 2rem;
      text-align: center;
      font-size: 0.85rem;
      line-height: 1.8;
    }

    footer a { color: #7FAFD4; text-decoration: none; }
    footer a:hover { color: var(--white); }

    @media (max-width: 600px) {
      .nav-links { display: none; }
      nav { padding: 0 1.25rem; }
      .not-found h1 { font-size: 3.5rem; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-brand" href="/">Great On Their Behalf</a>
  <ul class="nav-links">
    <li><a href="/#practices">The Index</a></li>
    <li><a href="/#districts">For School Systems</a></li>
    <li><a href="/#practitioners">For Practitioners</a></li>
  </ul>
</nav>

<main>
  <div class="not-found">
    <h1>404</h1>
    <h2>Page not found</h2>
    <p>This page doesn't exist.</p>
    <a href="/" class="btn-back">&#8592; Back to home</a>
  </div>
</main>

<footer>
  <div>
    <a href="https://effectiveschoolboards.com">effectiveschoolboards.com</a>
    &nbsp;·&nbsp;
    <a href="https://www.effectiveschoolboards.com/privacy-policy/">Privacy Policy</a>
  </div>
  <div style="margin-top:0.5rem; color: #4A7A9E; font-size:0.8rem;">&copy; 2026 Effective School Boards, LLC</div>
</footer>

</body>
</html>
